# this file is meant for Docker Swarm stacks only
# trying it in compose will fail because of multiple replicas trying to bind to the same port
# Swarm currently does not support Compose Spec, so we'll pin to the older version 3.9

version: "3.9"

services:
  redis:
    image: redis:alpine
    networks:
      - frontend

  vote:
    image: dockersamples/examplevotingapp_vote
    ports:
      - 5000:80
    networks:
      - frontend
    deploy:
      replicas: 3
    environment:
      DATABASE_URL: "postgres://adminlks:adminlkspassword@lksrds.c0f75rlqxhpi.us-east-1.rds.amazonaws.com/lksdb"

  result:
    image: dockersamples/examplevotingapp_result
    ports:
      - 5001:80
    networks:
      - backend
    deploy:
      replicas: 3
    environment:
      DATABASE_URL: "postgres://adminlks:adminlkspassword@lksrds.c0f75rlqxhpi.us-east-1.rds.amazonaws.com/lksdb"

  worker:
    image: dockersamples/examplevotingapp_worker
    networks:
      - frontend
      - backend
    deploy:
      replicas: 3
    environment:
      DATABASE_URL: "postgres://adminlks:adminlkspassword@lksrds.c0f75rlqxhpi.us-east-1.rds.amazonaws.com/lksdb"

networks:
  frontend:
  backend:
