name: lks-prod-pipeline

on:
  push:
    branches:
      - "prod"

env:
  AWS_REGION: us-east-1                 
  ECR_REPOSITORY: lks-voting-image
  ECS_SERVICE_WORKER: worker-service          
  ECS_CLUSTER: demo-deploy
  WORKER_TASK_DEFINITION: worker/task-definition.json
  WORKER_CONTAINER_NAME: worker-container
  ENV: "prod"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Image Development
    runs-on: ubuntu-latest
    environment: Development
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        WORKER_IMAGE_TAG: worker-${{ env.ENV }}-latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$WORKER_IMAGE_TAG --build-arg aws_region=${{ env.AWS_REGION }} --build-arg copy_or_mount="copy" -f worker/Dockerfile ./worker
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$WORKER_IMAGE_TAG
        echo "::set-output name=worker_image::$ECR_REGISTRY/$ECR_REPOSITORY:$WORKER_IMAGE_TAG"

  deploy:
    name: Deploy to ECS and Notify
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Update ECS Task Definition
        run: |
          aws ecs update-service --cluster my-ecs-cluster --service my-service --force-new-deployment

      - name: Send Notification
        run: |
          aws sns publish --topic-arn arn:aws:sns:${{ env.AWS_REGION }}:123456789012:MyTopic --message "Deployment to production was successful"
